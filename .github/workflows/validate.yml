name: HACS Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
